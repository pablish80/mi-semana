<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e0c">
<meta name="color-scheme" content="dark">
<meta name="darkreader-lock">
<title>Scheda</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  color-scheme: dark;
  --bg: #0f0e0c;
  --surface: #1a1916;
  --border: #2e2c28;
  --accent: #e8c96d;
  --text: #f0ece0;
  --muted: #857f6e;
  --slot: 52px;

  --c-fx:       #FFF5C0;   --c-fx-t:       #4A3C00;   --c-fx-b:       #C8A800;
  --c-eco:      #FFE97A;   --c-eco-t:      #4A3600;   --c-eco-b:      #C89000;
  --c-md:       #FFCC44;   --c-md-t:       #4A2E00;   --c-md-b:       #C87800;
  --c-prohps:   #FFAA44;   --c-prohps-t:   #4A2200;   --c-prohps-b:   #C85800;
  --c-estudio:  #C8DCEE;   --c-estudio-t:  #1A3A50;   --c-estudio-b:  #6A9EC0;
  --c-ejercicio:#C8E8D4;   --c-ejercicio-t:#1A3A28;   --c-ejercicio-b:#5AA07A;
  --c-billar:   #B8E8D0;   --c-billar-t:   #103828;   --c-billar-b:   #4A9070;
  --c-social:   #F0E8D8;   --c-social-t:   #3A2E1A;   --c-social-b:   #A09070;
  --c-helena:   #F9D8D8;   --c-helena-t:   #501313;   --c-helena-b:   #C07080;
  --c-ocio:     #2a2825;   --c-ocio-t:     #857f6e;   --c-ocio-b:     #3e3b35;
  --c-libre:    #2a2825;   --c-libre-t:    #857f6e;   --c-libre-b:    #3e3b35;
  --c-desplaz:  #DCDCE8;   --c-desplaz-t:  #2C2C3A;   --c-desplaz-b:  #8888A8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-forced-color-adjust: none !important; forced-color-adjust: none !important; }

body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace;
  height: 100dvh; display: flex; flex-direction: column;
  overflow: hidden; user-select: none;
}

/* ── HEADER ── */
.app-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.app-title { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); }
.week-label { font-size: 10px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; }
.btn-add {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--accent); color: #1a1610; border: none; font-size: 22px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.sync-dot {
  width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background .3s;
}
.sync-dot.syncing { background: var(--accent); }
.sync-dot.ok      { background: #9FE1CB; }
.sync-dot.error   { background: #E24B4A; }

/* ── DAY TABS ── */
.day-tabs {
  display: flex; gap: 4px; padding: 8px 12px; overflow-x: auto; flex-shrink: 0; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
  background: var(--surface); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer;
}
.day-tab.active { background: var(--accent); color: #1a1610; border-color: var(--accent); font-weight: 500; }

/* ── DAY VIEW LAYOUT ── */
.day-view-wrap {
  flex: 1; display: none; flex-direction: row; overflow: hidden; min-height: 0;
}
.cal-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  scrollbar-width: none; display: block; min-height: 0;
}
.cal-scroll::-webkit-scrollbar { display: none; }
.cal-grid { display: block; position: relative; width: 100%; }

.time-col { position: absolute; left: 0; top: 0; width: 44px; z-index: 5; background: var(--bg); }
.time-slot {
  height: var(--slot); display: flex; align-items: flex-start;
  justify-content: flex-end; padding: 3px 8px 0 0; font-size: 9px; color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.events-col { position: relative; margin-left: 44px; width: calc(100% - 44px); min-width: 0; }
.hour-row { height: var(--slot); border-bottom: 1px solid var(--border); position: absolute; left: 0; right: 0; }
.hour-row.half::after {
  content: ''; display: block; position: absolute; left: 0; right: 0;
  top: calc(var(--slot) / 2); border-top: 1px dashed rgba(255,255,255,.06);
}

/* ── VERTICAL SCROLLBAR ── */
.vscroll-bar {
  width: 36px; flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
  background: var(--surface); border-left: 1px solid var(--border); padding: 4px 0; gap: 4px;
}
.vscroll-btn {
  width: 28px; height: 28px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); font-size: 14px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.vscroll-btn:active { background: var(--border); color: var(--text); }
.vscroll-track-wrap {
  flex: 1; width: 28px; border-radius: 8px; background: var(--bg);
  border: 1px solid var(--border); position: relative; overflow: hidden; cursor: pointer; min-height: 40px;
}
.vscroll-thumb {
  position: absolute; left: 3px; right: 3px; border-radius: 6px;
  background: var(--border); min-height: 20px; touch-action: none;
}
.vscroll-thumb.dragging { background: var(--muted); }

/* ── WEEK VIEW LAYOUT ── */
.week-view-wrap { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }
.week-grid-wrap { flex: 1; overflow-x: auto; overflow-y: auto; scrollbar-width: none; min-height: 0; }
.week-grid-wrap::-webkit-scrollbar { display: none; }
.week-grid { display: grid; grid-template-columns: 36px repeat(7, 1fr); min-width: 520px; }

/* ── HORIZONTAL SCROLLBAR ── */
.hscroll-bar {
  height: 44px; flex-shrink: 0; display: flex; flex-direction: row; align-items: center;
  background: var(--surface); border-top: 1px solid var(--border); padding: 0 6px; gap: 4px;
}
.hscroll-btn {
  width: 32px; height: 32px; border-radius: 6px; border: 1px solid var(--border);
  background: var(--bg); color: var(--muted); font-size: 18px;
  display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
}
.hscroll-btn:active { background: var(--border); color: var(--text); }
.hscroll-track-wrap {
  flex: 1; height: 28px; border-radius: 8px; background: var(--bg);
  border: 1px solid var(--border); position: relative; overflow: hidden; cursor: pointer;
}
.hscroll-thumb {
  position: absolute; top: 3px; bottom: 3px; border-radius: 6px;
  background: var(--border); min-width: 30px; touch-action: none;
}
.hscroll-thumb.dragging { background: var(--muted); }

/* ── WEEK GRID CELLS ── */
.wg-head-empty { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); }
.wg-head-cell {
  position: sticky; top: 0; z-index: 10; background: var(--surface);
  padding: 6px 2px; text-align: center;
  border-bottom: 1px solid var(--border); border-left: 1px solid var(--border);
}
.wg-head-cell .dn { display: block; font-size: 10px; font-weight: 500; color: var(--text); }
.wg-head-cell .dd { display: block; font-size: 8px; color: var(--muted); }
.wg-head-cell.active-day { background: var(--accent); }
.wg-head-cell.active-day .dn, .wg-head-cell.active-day .dd { color: #1a1610; }
.wg-time-col { border-right: 1px solid var(--border); }
.wg-time-slot {
  height: var(--slot); display: flex; align-items: flex-start; justify-content: flex-end;
  padding: 3px 5px 0 0; font-size: 8px; color: var(--muted); border-bottom: 1px solid var(--border);
}
.wg-day-col { position: relative; border-left: 1px solid var(--border); }
.wg-hour-row { height: var(--slot); border-bottom: 1px solid var(--border); position: absolute; left: 0; right: 0; }
.wg-event {
  position: absolute; left: 1px; right: 1px; border-radius: 3px; padding: 1px 3px;
  border-left: 2px solid; overflow: hidden; font-size: 8px; cursor: pointer; z-index: 2;
  display: flex; align-items: center; justify-content: center;
}
.wg-event:hover { opacity: .8; }
.wg-event-title {
  font-weight: 500; text-transform: uppercase; letter-spacing: .04em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-align: center;
}

/* ── EVENT BLOCKS ── */
.event {
  position: absolute; left: 6px; right: 6px; border-radius: 6px; padding: 4px 6px;
  border-left: 3px solid; overflow: hidden; cursor: pointer; touch-action: none;
  z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center;
}
.event.dragging { z-index: 100; opacity: .9; box-shadow: 0 8px 24px rgba(0,0,0,.5); }
.event-title {
  font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: .06em;
  text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
}
.event-time { font-size: 9px; opacity: .75; margin-top: 2px; text-align: center; }
.resize-handle {
  position: absolute; bottom: 0; left: 0; right: 0; height: 10px; cursor: ns-resize;
  display: flex; align-items: center; justify-content: center;
}
.resize-handle::after { content: ''; width: 24px; height: 2px; background: currentColor; opacity: .4; border-radius: 1px; }

/* Category colors */
.ev-fx        { background: #FFF5C0 !important; color: #4A3C00 !important; border-color: #C8A800 !important; }
.ev-eco       { background: #FFE97A !important; color: #4A3600 !important; border-color: #C89000 !important; }
.ev-md        { background: #FFCC44 !important; color: #4A2E00 !important; border-color: #C87800 !important; }
.ev-prohps    { background: #FFAA44 !important; color: #4A2200 !important; border-color: #C85800 !important; }
.ev-estudio   { background: #C8DCEE !important; color: #1A3A50 !important; border-color: #6A9EC0 !important; }
.ev-ejercicio { background: #C8E8D4 !important; color: #1A3A28 !important; border-color: #5AA07A !important; }
.ev-billar    { background: #B8E8D0 !important; color: #103828 !important; border-color: #4A9070 !important; }
.ev-social    { background: #F0E8D8 !important; color: #3A2E1A !important; border-color: #A09070 !important; }
.ev-helena    { background: #F9D8D8 !important; color: #501313 !important; border-color: #C07080 !important; }
.ev-ocio      { background: #2a2825 !important; color: #857f6e !important; border-color: #3e3b35 !important; }
.ev-libre     { background: #2a2825 !important; color: #857f6e !important; border-color: #3e3b35 !important; }
.ev-desplaz   { background: #DCDCE8 !important; color: #2C2C3A !important; border-color: #8888A8 !important; }

/* ── MODAL ── */
.modal-backdrop {
  position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,.7);
  display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }
.modal {
  width: 100%; background: var(--surface); border-radius: 20px 20px 0 0;
  padding: 20px 20px 36px; transform: translateY(100%); transition: transform .25s ease;
  border-top: 1px solid var(--border);
}
.modal-backdrop.open .modal { transform: translateY(0); }
.modal-handle { width: 40px; height: 4px; border-radius: 2px; background: var(--border); margin: 0 auto 20px; }
.modal-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); margin-bottom: 16px; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 5px; display: block; }
.form-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 12px; outline: none;
}
.form-input:focus { border-color: var(--accent); }
.cat-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; }
.cat-btn {
  padding: 6px 2px; border-radius: 6px; border: 2px solid transparent;
  font-size: 8px; font-family: 'DM Mono', monospace; text-align: center; cursor: pointer;
}
.cat-btn.selected { border-color: var(--text); }
.time-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-save {
  flex: 1; padding: 13px; border-radius: 10px; background: var(--accent); color: #1a1610;
  font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; border: none; cursor: pointer;
}
.btn-delete {
  padding: 13px 18px; border-radius: 10px; background: transparent; color: #E24B4A;
  border: 1px solid #E24B4A; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer;
}
.btn-cancel {
  padding: 13px 18px; border-radius: 10px; background: transparent; color: var(--muted);
  border: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer;
}

/* ── CALLS ── */
.calls-section { padding: 10px 14px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
.calls-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
.calls-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip { font-size: 10px; padding: 3px 10px; border-radius: 99px; border: 1px solid; }
.chip-weekly  { background: var(--c-social); color: var(--c-social-t); border-color: var(--c-social-b); }
.chip-monthly { background: var(--c-trabajo); color: var(--c-trabajo-t); border-color: var(--c-trabajo-b); }

/* ── VIEW TOGGLE ── */
.view-toggle { display: flex; gap: 4px; background: var(--surface); border-radius: 8px; padding: 3px; border: 1px solid var(--border); }
.view-btn {
  padding: 5px 10px; border-radius: 5px; border: none; background: transparent; color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 10px; cursor: pointer;
}
.view-btn.active { background: var(--accent); color: #1a1610; font-weight: 500; }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="app-title">Scheda</div>
    <div class="week-label" id="week-label">Cargando…</div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="view-toggle">
      <button class="view-btn active" id="btn-view-week" onclick="setView('week')">Semana</button>
      <button class="view-btn" id="btn-view-day" onclick="setView('day')">Día</button>
    </div>
    <div class="sync-dot" id="sync-dot"></div>
    <button class="btn-add" id="btn-add">+</button>
  </div>
</div>

<!-- DAY VIEW -->
<div class="day-tabs" id="day-tabs" style="display:none"></div>
<div class="day-view-wrap" id="day-view-wrap">
  <div class="cal-scroll" id="cal-scroll">
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="vscroll-bar">
    <button class="vscroll-btn" id="vscroll-up">∧</button>
    <div class="vscroll-track-wrap" id="vscroll-track">
      <div class="vscroll-thumb" id="vscroll-thumb"></div>
    </div>
    <button class="vscroll-btn" id="vscroll-down">∨</button>
  </div>
</div>

<!-- WEEK VIEW -->
<div class="week-view-wrap" id="week-view-wrap">
  <div class="week-grid-wrap" id="week-grid-wrap">
    <div class="week-grid" id="week-grid"></div>
  </div>
  <div class="hscroll-bar">
    <button class="hscroll-btn" id="hscroll-left">&#8249;</button>
    <div class="hscroll-track-wrap" id="hscroll-track">
      <div class="hscroll-thumb" id="hscroll-thumb"></div>
    </div>
    <button class="hscroll-btn" id="hscroll-right">&#8250;</button>
  </div>
</div>

<div class="calls-section">
  <div class="calls-label">Llamadas esta semana</div>
  <div class="calls-chips" id="calls-chips"></div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">Editar bloque</div>
    <div class="form-row">
      <label class="form-label">Título</label>
      <input class="form-input" id="inp-title" type="text" placeholder="Nombre del bloque">
    </div>
    <div class="form-row">
      <label class="form-label">Notas</label>
      <input class="form-input" id="inp-note" type="text" placeholder="Descripción opcional">
    </div>
    <div class="form-row time-row">
      <div><label class="form-label">Inicio</label><input class="form-input" id="inp-start" type="time"></div>
      <div><label class="form-label">Fin</label><input class="form-input" id="inp-end" type="time"></div>
    </div>
    <div class="form-row">
      <label class="form-label">Categoría</label>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="btn-cancel">Cancelar</button>
      <button class="btn-save" id="btn-save">Guardar</button>
      <button class="btn-delete" id="btn-delete" style="display:none">Borrar</button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE ──
const SUPABASE_URL = 'https://xvuepvqwjtahigxyppte.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh2dWVwdnF3anRhaGlneHlwcHRlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5OTM4MDQsImV4cCI6MjA4OTU2OTgwNH0.qr0qcXIyK6AdtgRSGTcSvEWHTVJhQTQ6wOFvsqh5URU';
const HEADERS = { 'Content-Type':'application/json', 'apikey':SUPABASE_KEY, 'Authorization':'Bearer '+SUPABASE_KEY };

function getWeekKey() {
  const now = new Date(), mon = new Date(now);
  mon.setDate(now.getDate() - ((now.getDay()+6)%7));
  const y = mon.getFullYear(), start = new Date(y,0,1);
  const w = Math.ceil(((mon-start)/86400000+start.getDay()+1)/7);
  return y+'-W'+String(w).padStart(2,'0');
}
function setSyncDot(s) { document.getElementById('sync-dot').className='sync-dot '+s; }

async function loadFromSupabase() {
  setSyncDot('syncing');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/schedules?week_key=eq.'+getWeekKey()+'&select=data,calls',{headers:HEADERS});
    if (!res.ok) throw new Error();
    const rows = await res.json();
    setSyncDot('ok'); setTimeout(()=>setSyncDot(''),2000);
    if (rows.length>0) {
      localStorage.setItem('scheda-schedule',JSON.stringify(rows[0].data));
      if (rows[0].calls) localStorage.setItem('scheda-calls',JSON.stringify(rows[0].calls));
      return { schedule:rows[0].data, calls:rows[0].calls||null };
    }
    return null;
  } catch(e) { setSyncDot('error'); return null; }
}

async function saveToSupabase(sd, cd) {
  setSyncDot('syncing');
  try {
    const res = await fetch(SUPABASE_URL+'/rest/v1/schedules',{
      method:'POST', headers:{...HEADERS,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({week_key:getWeekKey(),data:sd,calls:cd||null,updated_at:new Date().toISOString()})
    });
    if (!res.ok) throw new Error();
    setSyncDot('ok'); setTimeout(()=>setSyncDot(''),2000);
  } catch(e) { setSyncDot('error'); }
}

// ── CONSTANTS ──
const CATEGORIES = [
  {id:'fx',       label:'FX'},
  {id:'eco',      label:'ECO'},
  {id:'md',       label:'MD'},
  {id:'prohps',   label:'PROHPS'},
  {id:'estudio',  label:'Estudio'},
  {id:'ejercicio',label:'Ejercicio'},
  {id:'billar',   label:'Billar'},
  {id:'social',   label:'Social'},
  {id:'helena',   label:'Helena'},
  {id:'desplaz',  label:'Desplaz.'},
  {id:'libre',    label:'Libre'},
  {id:'ocio',     label:'Ocio'},
];
const START_H=7, END_H=24, TOTAL=END_H-START_H, SLOT=52;

function buildDays() {
  const now=new Date(), monday=new Date(now);
  monday.setDate(now.getDate()-((now.getDay()+6)%7));
  const dn=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
  const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const days=[];
  for(let i=0;i<7;i++){const d=new Date(monday);d.setDate(monday.getDate()+i);days.push({name:dn[i],date:d.getDate()+' '+mn[d.getMonth()]});}
  const e=new Date(monday);e.setDate(monday.getDate()+6);
  document.getElementById('week-label').textContent=monday.getDate()+' – '+e.getDate()+' '+mn[e.getMonth()]+' '+e.getFullYear();
  return days;
}
const DAYS=buildDays();

// ── DEFAULT SCHEDULE ──
const DEFAULT_SCHEDULE=[
  [// LUN

function uid(){return Math.random().toString(36).slice(2,9);}
function hToStr(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);return hh.toString().padStart(2,'0')+':'+mm.toString().padStart(2,'0');}
function strToH(s){const[hh,mm]=s.split(':').map(Number);return hh+mm/60;}
function hToPx(h){return(h-START_H)*SLOT;}

// ── STATE ──
let schedule=[], callsData=null;
let activeDay=new Date().getDay()===0?6:new Date().getDay()-1;

function loadLocal(){
  try{const s=localStorage.getItem('scheda-schedule');if(s)return JSON.parse(s);}catch(e){}
  return DEFAULT_SCHEDULE.map(day=>day.map(ev=>({...ev,id:uid()})));
}
function saveLocal(){
  try{localStorage.setItem('scheda-schedule',JSON.stringify(schedule));}catch(e){}
  if(callsData)try{localStorage.setItem('scheda-calls',JSON.stringify(callsData));}catch(e){}
}
async function saveSchedule(){saveLocal();await saveToSupabase(schedule,callsData);}

function renderCalls(){
  const c=document.getElementById('calls-chips'); c.innerHTML='';
  if(!callsData)return;
  (callsData.weekly||[]).forEach(n=>{const ch=document.createElement('span');ch.className='chip chip-weekly';ch.textContent=n;c.appendChild(ch);});
  (callsData.monthly||[]).forEach(n=>{const ch=document.createElement('span');ch.className='chip chip-monthly';ch.textContent=n;c.appendChild(ch);});
}

// ── VIEW ──
let currentView='week';
function setView(v){
  currentView=v;
  document.getElementById('btn-view-week').classList.toggle('active',v==='week');
  document.getElementById('btn-view-day').classList.toggle('active',v==='day');
  document.getElementById('day-tabs').style.display=v==='day'?'flex':'none';
  document.getElementById('day-view-wrap').style.display=v==='day'?'flex':'none';
  document.getElementById('week-view-wrap').style.display=v==='week'?'flex':'none';
  if(v==='week'){renderWeek();setTimeout(initHScroll,60);}
  else{renderDay();setTimeout(initVScroll,60);}
}

// ── WEEK VIEW ──
function renderWeek(){
  const grid=document.getElementById('week-grid');
  grid.innerHTML='';
  const totalH=TOTAL*SLOT;
  const eh=document.createElement('div');eh.className='wg-head-empty';grid.appendChild(eh);
  DAYS.forEach((d,i)=>{
    const cell=document.createElement('div');
    cell.className='wg-head-cell'+(i===activeDay?' active-day':'');
    cell.innerHTML='<span class="dn">'+d.name+'</span><span class="dd">'+d.date+'</span>';
    cell.onclick=()=>{activeDay=i;setView('day');};
    grid.appendChild(cell);
  });
  const tc=document.createElement('div');tc.className='wg-time-col';tc.style.height=totalH+'px';
  for(let h=START_H;h<END_H;h++){const s=document.createElement('div');s.className='wg-time-slot';s.textContent=h+':00';tc.appendChild(s);}
  grid.appendChild(tc);
  DAYS.forEach((d,di)=>{
    const col=document.createElement('div');col.className='wg-day-col';col.style.height=totalH+'px';col.style.position='relative';
    for(let h=START_H;h<END_H;h++){const r=document.createElement('div');r.className='wg-hour-row';r.style.top=hToPx(h)+'px';col.appendChild(r);}
    (schedule[di]||[]).forEach(ev=>{
      const top=hToPx(ev.s),height=Math.max(hToPx(ev.e)-top-1,10);
      const el=document.createElement('div');el.className='wg-event ev-'+ev.c;
      el.style.top=top+'px';el.style.height=height+'px';
      el.innerHTML='<div class="wg-event-title">'+ev.t+'</div>';
      el.onclick=()=>{activeDay=di;setView('day');setTimeout(()=>openModal(ev.id),100);};
      col.appendChild(el);
    });
    grid.appendChild(col);
  });
  setTimeout(()=>{document.getElementById('week-grid-wrap').scrollTop=hToPx(8);},50);
}

// ── DAY VIEW ──
function buildTabs(){
  const el=document.getElementById('day-tabs');el.innerHTML='';

function renderDay(){
  buildTabs();
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';grid.style.height=(TOTAL*SLOT)+'px';grid.style.position='relative';
  const tc=document.createElement('div');tc.className='time-col';tc.style.height=(TOTAL*SLOT)+'px';
  for(let h=START_H;h<END_H;h++){const s=document.createElement('div');s.className='time-slot';s.textContent=h+':00';tc.appendChild(s);}
  grid.appendChild(tc);
  const ec=document.createElement('div');ec.className='events-col';ec.style.height=(TOTAL*SLOT)+'px';
  for(let h=START_H;h<END_H;h++){const r=document.createElement('div');r.className='hour-row half';r.style.top=hToPx(h)+'px';ec.appendChild(r);}
  (schedule[activeDay]||[]).forEach(ev=>ec.appendChild(createEventEl(ev)));
  grid.appendChild(ec);
  setTimeout(()=>{document.getElementById('cal-scroll').scrollTop=hToPx(8);syncVThumb();},50);
}

function createEventEl(ev){
  const top=hToPx(ev.s),height=hToPx(ev.e)-top;
  const el=document.createElement('div');
  el.className='event ev-'+ev.c;el.style.top=top+'px';el.style.height=Math.max(height-2,18)+'px';el.dataset.id=ev.id;
  el.innerHTML=`<div class="event-title">${ev.t}</div>${height>36?'<div class="event-time">'+hToStr(ev.s)+'–'+hToStr(ev.e)+'</div>':''}<div class="resize-handle" data-resize="true"></div>`;

  let tapTimer,moved=false;
  el.addEventListener('pointerdown',e=>{if(e.target.dataset.resize)return;moved=false;tapTimer=setTimeout(()=>{if(!moved)openModal(ev.id);},200);});
  el.addEventListener('pointermove',()=>{moved=true;});

  let dragStart=null,origS,origE;
  el.addEventListener('pointerdown',e=>{
    if(e.target.dataset.resize)return;
    el.setPointerCapture(e.pointerId);dragStart=e.clientY;origS=ev.s;origE=ev.e;
    el.addEventListener('pointermove',onDragMove);el.addEventListener('pointerup',onDragEnd,{once:true});
  });
  function onDragMove(e){
    if(!dragStart)return;
    const dur=origE-origS;let ns=Math.round((origS+(e.clientY-dragStart)/SLOT)*4)/4;
    ns=Math.max(START_H,Math.min(END_H-dur,ns));ev.s=ns;ev.e=ns+dur;
    el.style.top=hToPx(ev.s)+'px';el.classList.add('dragging');
    const t=el.querySelector('.event-time');if(t)t.textContent=hToStr(ev.s)+'–'+hToStr(ev.e);
  }
  function onDragEnd(){dragStart=null;el.classList.remove('dragging');el.removeEventListener('pointermove',onDragMove);saveSchedule();}

  const handle=el.querySelector('[data-resize]');let resizeStart=null,origEnd;
  handle.addEventListener('pointerdown',e=>{
    e.stopPropagation();handle.setPointerCapture(e.pointerId);resizeStart=e.clientY;origEnd=ev.e;
    handle.addEventListener('pointermove',onResizeMove);handle.addEventListener('pointerup',onResizeEnd,{once:true});
  });
  function onResizeMove(e){
    if(resizeStart===null)return;
    let ne=Math.round((origEnd+(e.clientY-resizeStart)/SLOT)*4)/4;ne=Math.max(ev.s+0.25,Math.min(END_H,ne));ev.e=ne;
    el.style.height=Math.max(hToPx(ev.e)-hToPx(ev.s)-2,18)+'px';
    const t=el.querySelector('.event-time');if(t)t.textContent=hToStr(ev.s)+'–'+hToStr(ev.e);
  }
  function onResizeEnd(){resizeStart=null;handle.removeEventListener('pointermove',onResizeMove);saveSchedule();}
  return el;
}

// ── VERTICAL SCROLLBAR ──
function syncVThumb(){
  const scroll=document.getElementById('cal-scroll');
  const track=document.getElementById('vscroll-track');
  const thumb=document.getElementById('vscroll-thumb');
  if(!scroll||!track||!thumb)return;
  const trackH=track.clientHeight;
  const ratio=scroll.clientHeight/scroll.scrollHeight;
  const thumbH=Math.max(trackH*ratio,24);
  const maxTop=trackH-thumbH;
  const top=scroll.scrollHeight>scroll.clientHeight?(scroll.scrollTop/(scroll.scrollHeight-scroll.clientHeight))*maxTop:0;
  thumb.style.height=thumbH+'px';thumb.style.top=top+'px';
}

function initVScroll(){
  const scroll=document.getElementById('cal-scroll');
  const track=document.getElementById('vscroll-track');
  const thumb=document.getElementById('vscroll-thumb');
  scroll.removeEventListener('scroll',syncVThumb);
  scroll.addEventListener('scroll',syncVThumb);
  syncVThumb();

  document.getElementById('vscroll-up').onclick=()=>{scroll.scrollBy({top:-SLOT*2,behavior:'smooth'});};
  document.getElementById('vscroll-down').onclick=()=>{scroll.scrollBy({top:SLOT*2,behavior:'smooth'});};

  let dragY=null,startTop;
  thumb.addEventListener('pointerdown',e=>{
    e.stopPropagation();thumb.setPointerCapture(e.pointerId);
    dragY=e.clientY;startTop=scroll.scrollTop;thumb.classList.add('dragging');
    thumb.addEventListener('pointermove',onTV);thumb.addEventListener('pointerup',onTVUp,{once:true});
  });
  function onTV(e){
    if(dragY===null)return;
    const trackH=track.clientHeight,thumbH=thumb.clientHeight,maxTop=trackH-thumbH;
    const ratio=(scroll.scrollHeight-scroll.clientHeight)/Math.max(maxTop,1);
    scroll.scrollTop=startTop+(e.clientY-dragY)*ratio;
  }
  function onTVUp(){dragY=null;thumb.classList.remove('dragging');thumb.removeEventListener('pointermove',onTV);}

  track.addEventListener('click',e=>{
    if(e.target===thumb)return;
    const rect=track.getBoundingClientRect();
    scroll.scrollTop=((e.clientY-rect.top)/track.clientHeight)*(scroll.scrollHeight-scroll.clientHeight);
  });
}

// ── HORIZONTAL SCROLLBAR ──
function syncHThumb(){
  const wrap=document.getElementById('week-grid-wrap');
  const track=document.getElementById('hscroll-track');
  const thumb=document.getElementById('hscroll-thumb');
  if(!wrap||!track||!thumb)return;
  const trackW=track.clientWidth;
  const ratio=wrap.clientWidth/wrap.scrollWidth;
  const thumbW=Math.max(trackW*ratio,30);
  const maxLeft=trackW-thumbW;
  const left=wrap.scrollWidth>wrap.clientWidth?(wrap.scrollLeft/(wrap.scrollWidth-wrap.clientWidth))*maxLeft:0;
  thumb.style.width=thumbW+'px';thumb.style.left=left+'px';
}

function initHScroll(){
  const wrap=document.getElementById('week-grid-wrap');
  const track=document.getElementById('hscroll-track');
  const thumb=document.getElementById('hscroll-thumb');
  wrap.removeEventListener('scroll',syncHThumb);
  wrap.addEventListener('scroll',syncHThumb);
  syncHThumb();

  document.getElementById('hscroll-left').onclick=()=>{wrap.scrollBy({left:-120,behavior:'smooth'});};
  document.getElementById('hscroll-right').onclick=()=>{wrap.scrollBy({left:120,behavior:'smooth'});};

  let dragX=null,startLeft;
  thumb.addEventListener('pointerdown',e=>{
    e.stopPropagation();thumb.setPointerCapture(e.pointerId);
    dragX=e.clientX;startLeft=wrap.scrollLeft;thumb.classList.add('dragging');
    thumb.addEventListener('pointermove',onTH);thumb.addEventListener('pointerup',onTHUp,{once:true});
  });
  function onTH(e){
    if(dragX===null)return;
    const trackW=track.clientWidth,thumbW=thumb.clientWidth,maxLeft=trackW-thumbW;
    const ratio=(wrap.scrollWidth-wrap.clientWidth)/Math.max(maxLeft,1);
    wrap.scrollLeft=startLeft+(e.clientX-dragX)*ratio;
  }
  function onTHUp(){dragX=null;thumb.classList.remove('dragging');thumb.removeEventListener('pointermove',onTH);}

  track.addEventListener('click',e=>{
    if(e.target===thumb)return;
    const rect=track.getBoundingClientRect();
    wrap.scrollLeft=((e.clientX-rect.left)/track.clientWidth)*(wrap.scrollWidth-wrap.clientWidth);
  });
}

// ── MODAL ──
let editingId=null,selectedCat='libre';
function openModal(id){
  editingId=id;const isNew=!id;const ev=id?schedule[activeDay].find(e=>e.id===id):null;
  document.getElementById('modal-title').textContent=isNew?'Nuevo bloque':'Editar bloque';
  document.getElementById('inp-title').value=ev?ev.t:'';
  document.getElementById('inp-note').value=ev?ev.n:'';
  document.getElementById('inp-start').value=ev?hToStr(ev.s):'09:00';
  document.getElementById('inp-end').value=ev?hToStr(ev.e):'10:00';
  document.getElementById('btn-delete').style.display=isNew?'none':'block';
  selectedCat=ev?ev.c:'libre';buildCatGrid();
  document.getElementById('modal').classList.add('open');
}
function closeModal(){document.getElementById('modal').classList.remove('open');editingId=null;}
function buildCatGrid(){
  const grid=document.getElementById('cat-grid');grid.innerHTML='';
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='cat-btn ev-'+cat.id+(cat.id===selectedCat?' selected':'');
    btn.textContent=cat.label;btn.onclick=()=>{selectedCat=cat.id;buildCatGrid();};
    grid.appendChild(btn);
  });
}

document.getElementById('btn-add').onclick=()=>openModal(null);
document.getElementById('btn-cancel').onclick=closeModal;
document.getElementById('modal').addEventListener('click',e=>{if(e.target===document.getElementById('modal'))closeModal();});
document.getElementById('btn-save').onclick=()=>{
  const t=document.getElementById('inp-title').value.trim()||'Sin título';
  const n=document.getElementById('inp-note').value.trim();
  const s=strToH(document.getElementById('inp-start').value);
  const e=strToH(document.getElementById('inp-end').value);
  if(e<=s){alert('La hora de fin debe ser posterior al inicio.');return;}
  if(editingId){const ev=schedule[activeDay].find(ev=>ev.id===editingId);if(ev){ev.t=t;ev.n=n;ev.s=s;ev.e=e;ev.c=selectedCat;}}
  else{schedule[activeDay].push({id:uid(),t,n,s,e,c:selectedCat});}
  saveSchedule();closeModal();renderDay();
};
document.getElementById('btn-delete').onclick=()=>{
  if(!editingId)return;
  schedule[activeDay]=schedule[activeDay].filter(ev=>ev.id!==editingId);
  saveSchedule();closeModal();renderDay();
};

// ── INIT ──
async function init(){
  buildCatGrid();
  const remote=await loadFromSupabase();
  if(remote&&remote.schedule){schedule=remote.schedule;callsData=remote.calls;}
  else{
    schedule=loadLocal();
    try{const c=localStorage.getItem('scheda-calls');if(c)callsData=JSON.parse(c);}catch(e){}
  }
  renderCalls();setView('week');
}

if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{});}
init();
